name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps

    - name: Create basic .env.dev file from example
      run: |
        # Create a dummy .env.dev if you need some structural vars,
        # or rely completely on GitHub Secrets
        cp .env.dev.example .env.dev
        echo "VALID_EMAIL=${{ secrets.VALID_EMAIL }}" >> .env.dev
        echo "VALID_PASSWORD=${{ secrets.VALID_PASSWORD }}" >> .env.dev

    - name: Run Playwright tests
      run: pytest --env dev --html=reports/report.html --self-contained-html
      env:
        # You can also pass secrets directly to the environment
        VALID_EMAIL: ${{ secrets.VALID_EMAIL }}
        VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: reports/report.html
        retention-days: 7
