name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps

    - name: Ensure report output folder exists
      run: mkdir -p artifacts/reports

    - name: Create `config/.env.dev` for CI
      run: |
        # `core.config.load_environment()` expects env files at `config/.env.<env_name>`
        # so we generate `config/.env.dev` from GitHub Secrets.
        mkdir -p config
        echo "BASE_URL=${{ secrets.BASE_URL }}" > config/.env.dev
        echo "VALID_EMAIL=${{ secrets.VALID_EMAIL }}" >> config/.env.dev
        echo "VALID_PASSWORD=${{ secrets.VALID_PASSWORD }}" >> config/.env.dev
        echo "HEADLESS=true" >> config/.env.dev
        echo "SLOW_MO=0" >> config/.env.dev
        echo "TIMEOUT=30000" >> config/.env.dev

    - name: Run Playwright tests
      run: pytest --env dev --html=artifacts/reports/report.html --self-contained-html

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: artifacts/reports/report.html
        retention-days: 7
