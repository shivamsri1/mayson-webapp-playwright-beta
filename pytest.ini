[pytest]
# Default command-line options
addopts = -v --tb=short

# Test file discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    positive: Positive test cases (expected to pass)
    negative: Negative test cases (expected to fail gracefully)
    smoke: Quick smoke tests
    regression: Full regression tests
